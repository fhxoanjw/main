  - "+.music.163.com"
  - "*.126.net"
  - musicapi.taihe.com
  - music.taihe.com
  - songsearch.kugou.com
  - trackercdn.kugou.com
  - "*.kuwo.cn"
  - api-jooxtt.sanook.com
  - api.joox.com
  - joox.com
  - "+.y.qq.com"
  - "+.music.tc.qq.com"
  - aqqmusic.tc.qq.com
  - "+.stream.qqmusic.qq.com"
  - "*.xiami.com"
  - "+.music.migu.cn"
  - "+.srv.nintendo.net"
  - "+.stun.playstation.net"
  - xbox.*.microsoft.com
  - "+.xboxlive.com"
  - localhost.ptlogin2.qq.com
  - proxy.golang.org
  - stun.*.*
  - stun.*.*.*
  - "*.mcdn.bilivideo.cn"
  nameserver:
  - tls://8.8.4.4
  - tls://1.1.1.0
  fallback-filter:
    geoip: false
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
  enable: true
proxies:

  - name: WARP
    type: wireguard
    server: 188.114.99.30
    port: 1070
    ip: 172.16.0.2
    ipv6: 2606:4700:110:83b0:ee64:3d3c:f1d7:53e5
    private-key: KGkGsFZuxbwCf0n0kgjbNmBN19uU4xlPvyW9DGWN63Q=
    public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
    udp: true
    remote-dns-resolve: true  
    ip-version: ipv6-prefer
    dialer-proxy: "WARP前置节点"

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - WARP
      - 自动选择
      - 负载均衡
      - 手动选择
      - DIRECT
  - name: WARP前置节点
    type: select
    proxies:
      - 自动选择
      - 负载均衡
      - 手动选择

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:


  - name: 手动选择
    type: select
    proxies:


  - name: 负载均衡
    type: load-balance #负载均衡
    proxies:

    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    #lazy: true
    #disable-udp: true
    strategy: round-robin #作为前置节点⽤这个⽐较好

      
rules:
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - RULE-SET,放行规则-lhie1(建议置顶并直连),DIRECT
  - RULE-SET,国内IP白名单(By lhie1),DIRECT
  - RULE-SET,放行规则-ACL4SSR(建议置顶并直连),DIRECT
  - RULE-SET,放行规则-ConnersHua(建议置顶并直连),DIRECT
  - GEOSITE,PRIVATE,DIRECT
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - DOMAIN-SUFFIX,oracle.com,DIRECT
  - DOMAIN-SUFFIX,steampowered.com,DIRECT
  - PROCESS-NAME,cfst,DIRECT,no-resolve
  - RULE-SET,国外常用网站合集,节点选择
  - RULE-SET,国外流媒体合集,节点选择
  - RULE-SET,国外常用网站合集(By lhie1),节点选择
  - MATCH,节点选择
rule-providers:
  放行规则-lhie1(建议置顶并直连):
    type: http
    behavior: classical
    path: "/etc/openclash/rule_provider/Special.yaml"
    url: https://raw.githubusercontent.com/dler-io/Rules/master/Clash/Provider/Special.yaml
    interval: 86400
  国内IP白名单(By lhie1):
    type: http
    behavior: ipcidr
    path: "/etc/openclash/rule_provider/Domestic IPs.yaml"
    url: https://raw.githubusercontent.com/dler-io/Rules/master/Clash/Provider/Domestic
      IPs.yaml
    interval: 86400
  放行规则-ACL4SSR(建议置顶并直连):
    type: http
    behavior: classical
    path: "/etc/openclash/rule_provider/UnBan.yaml"
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/UnBan.yaml
    interval: 86400
  放行规则-ConnersHua(建议置顶并直连):
    type: http
    behavior: classical
    path: "/etc/openclash/rule_provider/Unbreak.yaml"
    url: https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Unbreak.yaml
    interval: 86400
  国外常用网站合集:
    type: http
    behavior: classical
    path: "/etc/openclash/rule_provider/Global.yaml"
    url: https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Global.yaml
    interval: 86400
  国外流媒体合集:
    type: http
    behavior: classical
    path: "/etc/openclash/rule_provider/Streaming.yaml"
    url: https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/StreamingMedia/Streaming.yaml
    interval: 86400
  国外常用网站合集(By lhie1):
    type: http
    behavior: classical
    path: "/etc/openclash/rule_provider/Proxy.yaml"
    url: https://raw.githubusercontent.com/dler-io/Rules/master/Clash/Provider/Proxy.yaml
    interval: 86400
