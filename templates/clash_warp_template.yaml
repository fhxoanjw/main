port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  geoip:cn:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  enable: true
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - tls://1.1.1.0
    - tls://8.8.4.4
    - https://dns64.dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
proxies:

  - name: WARP
    type: wireguard
    server: 2606:4700:d0::dcec:5e70:cfd2:abdb
    port: 987
    ip: 172.16.0.2
    ipv6: 2606:4700:110:83b0:ee64:3d3c:f1d7:53e5
    private-key: KGkGsFZuxbwCf0n0kgjbNmBN19uU4xlPvyW9DGWN63Q=
    public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
    udp: true
    remote-dns-resolve: true  
    ip-version: ipv6-prefer
    reserved: [78, 135, 76] 
    dialer-proxy: "WARP前置节点"

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - WARP
      - 自动选择
      - 负载均衡
      - 手动选择
      - DIRECT
  - name: WARP前置节点
    type: select
    proxies:
      - 自动选择
      - 负载均衡
      - 手动选择

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:


  - name: 手动选择
    type: select
    proxies:


  - name: 负载均衡
    type: load-balance #负载均衡
    proxies:

    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    #lazy: true
    #disable-udp: true
    strategy: round-robin #作为前置节点⽤这个⽐较好

      
rules:
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,节点选择
