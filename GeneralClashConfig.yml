port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
dns:
 enable: true
 prefer-h3: true
 listen: :7053
 enhanced-mode: fake-ip
 fake-ip-range: 28.0.0.1/8
 fake-ip-filter:
   - "*"
   - "+.lan"
   - "+.local"
 nameserver:
   - https://8.8.8.8/dns-query
   - https://1.1.1.1/dns-query
 nameserver-policy:
   "geosite:cn,private": [https://223.5.5.5/dns-query, https://223.6.6.6/dns-query]
